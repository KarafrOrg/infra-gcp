name: Test federation
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bootstrap-repository
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: '${{ vars.GCP_WIF_RESOURCE_ID }}'
          service_account: github-actions-infra-cluster@karafra-net.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v3
