name: Plan Terraform changes
description: GitHub Action to plan Terraform changes
inputs:
  plan_command:
    description: 'Command to run Terraform plan'
    required: false
    default: mise plan
outputs:
  plan_outcome:
    description: 'The stdout from the Terraform plan command'
    value: ${{ steps.plan.outcome }}
  init_outcome:
    description: 'The outcome of the Terraform init step'
    value: ${{ steps.init.outcome }}
  check_outcome:
    description: 'The outcome of the Terraform validate step'
    value: ${{ steps.check.outcome }}
  plan_output:
    description: 'The stdout from the Terraform plan command'
    value: ${{ steps.plan.outputs.stdout }}
  init_output:
    description: 'The stdout from the Terraform init command'
    value: ${{ steps.init.outputs.stdout }}
  check_output:
    description: 'The stdout from the Terraform validate command'
    value: ${{ steps.check.outputs.stdout }}
runs:
  using: composite
  steps:
    - name: Terraform init
      # language=bash
      run: |
        (mise init 2>&1) | tee init.log
        
        echo "stdout<<EOF" >> $GITHUB_OUTPUT
        sed 's/\x1b\[[0-9;]*m//g' init.log >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      id: init
      shell: bash

    - name: Terraform Check
      # language=bash
      run: |
        (mise validate 2>&1) | tee check.log
        
        echo "stdout<<EOF" >> $GITHUB_OUTPUT
        sed 's/\x1b\[[0-9;]*m//g' check.log >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      shell: bash
      id: check

    - name: Terraform Plan
      # language=bash
      run: |
        (${{ inputs.plan_command }} 2>&1) | tee plan.log
        
        echo "stdout<<EOF" >> $GITHUB_OUTPUT
        sed 's/\x1b\[[0-9;]*m//g' plan.log >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      shell: bash
      id: plan

    - name: Upload Terraform logs as artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: Terraform-logs-${{ inputs.environment }}-${{ github.sha }}
        path: |
          init.log
          check.log
          plan.log
        retention-days: 7

    - name: Post plan to step summary
      uses: actions/github-script@v8
      if: always()
      env:
        PLAN_OUTCOME: ${{ steps.plan.outcome }}
        CHECK_OUTCOME: ${{ steps.check.outcome }}
        INIT_OUTCOME: ${{ steps.init.outcome }}
        PLAN_LOG_PATH: plan.log
        ENVIRONMENT: ${{ inputs.environment }}
        # language=javascript
      with:
        script: |
          const fs = require('fs');
          const planOutcome = process.env.PLAN_OUTCOME;
          const checkOutcome = process.env.CHECK_OUTCOME;
          const initOutcome = process.env.INIT_OUTCOME;
          const planLogPath = process.env.PLAN_LOG_PATH;
          const environment = process.env.ENVIRONMENT;

          // Read plan output from file
          let planOutput = '';
          try {
              let rawOutput = fs.readFileSync(planLogPath, 'utf8');
              
              // Strip ANSI color codes and control characters
              rawOutput = rawOutput.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
              rawOutput = rawOutput.replace(/[\x00-\x08\x0B-\x0C\x0E-\x1F\x7F]/g, '');
              
              const lines = rawOutput.split('\n');
              
              // Check if "Terraform will perform the following actions:" is present
              const performActionsIndex = lines.findIndex(line => 
                  line.includes('Terraform will perform the following actions:')
              );
              
              if (performActionsIndex !== -1) {
                  // Skip the "Terraform will perform..." line and one empty line after it
                  let startIndex = performActionsIndex + 1;
                  // Skip one more line if it's empty
                  if (startIndex < lines.length && lines[startIndex].trim() === '') {
                      startIndex++;
                  }
                  
                  // Find the end (Plan: summary or end of output)
                  let endIndex = lines.length;
                  for (let i = startIndex; i < lines.length; i++) {
                      if (lines[i].includes('Plan:') || lines[i].includes('Finished in')) {
                          endIndex = i;
                          break;
                      }
                  }
                  
                  planOutput = lines.slice(startIndex, endIndex).join('\n').trim();
              } else {
                  // Fallback: look for "No changes" message
                  const noChangesIndex = lines.findIndex(line => line.includes('No changes.'));
                  if (noChangesIndex !== -1) {
                      planOutput = 'No changes. Your infrastructure matches the configuration.';
                  } else {
                      // Filter out noise as before
                      let planLines = [];
                      let inPlanSection = false;
                      
                      for (let i = 0; i < lines.length; i++) {
                          const line = lines[i];
                          
                          // Start capturing at resource changes
                          if (line.includes('Resource actions are indicated') ||
                              line.match(/^\s*[#+~-]/)) {
                              inPlanSection = true;
                          }
                          
                          // Stop at summary line
                          if (line.includes('Plan:') || line.includes('Finished in')) {
                              break;
                          }
                          
                          // Skip noise lines
                          if (line.includes('Refreshing state...') ||
                              line.includes('Reading...') ||
                              line.includes('Read complete') ||
                              line.includes('[secrets]') ||
                              line.includes('[init]') ||
                              line.includes('[plan]') ||
                              line.includes('$ cd ') ||
                              line.includes('$ get_secret') ||
                              line.includes('Secrets written') ||
                              line.includes('Initializing') ||
                              line.includes('Using terraform') ||
                              line.includes('Reusing previous') ||
                              line.includes('Using previously-installed') ||
                              line.includes('Try running') ||
                              line.includes('All Terraform commands')) {
                              continue;
                          }
                          
                          if (inPlanSection) {
                              planLines.push(line);
                          }
                      }
                      
                      planOutput = planLines.join('\n').trim();
                  }
              }
              
              if (!planOutput) {
                  planOutput = 'No changes detected.';
              }
          } catch (error) {
              planOutput = 'Error reading plan output: ' + error.message;
          }

          const summary = [
              `## Terraform Plan - ${environment}`,
              '',
              '| Step | Status |',
              '| ---- | -------- |',
              `| Terraform Initialization :wrench:️ | \`${initOutcome}\` |`,
              `| Terraform Check :white_check_mark: | \`${checkOutcome}\` |`,
              `| Terraform Plan :pencil: | \`${planOutcome}\` |`,
              '',
              '<details>',
              '',
              '<summary>Show Plan Output</summary>',
              '',
              '```terraform',
              planOutput,
              '```',
              '',
              '</details>',
              '',
              ':package: **Full logs available in workflow artifacts**'
          ].join('\n');

          await core.summary.addRaw(summary).write();
