name: Plan Tofu
description: GitHub Action to plan Tofu changes
inputs:
  environment:
    description: 'Environment to deploy to (e.g., production, staging)'
    required: true
    default: production
  service_account:
    description: 'Service account to impersonate for OIDC token generation'
    required: false
    default: terraform@karafra-net.iam.gserviceaccount.com
  workload_identity_pool_project_number:
    description: 'GCP project number for workload identity pool'
    required: false
    default: '1019265211616'
  workload_identity_pool_id:
    description: 'Workload identity pool ID'
    required: false
    default: terraform-cloud
  workload_identity_provider_id:
    description: 'Workload identity provider ID'
    required: false
    default: terraform-cloud
  plan_command:
    description: 'Command to run Terraform plan'
    required: false
    default: mise plan
outputs:
  plan_outcome:
    description: 'The stdout from the Tofu plan command'
    value: ${{ steps.plan.outcome }}
  init_outcome:
    description: 'The outcome of the Tofu init step'
    value: ${{ steps.init.outcome }}
  check_outcome:
    description: 'The outcome of the Tofu validate step'
    value: ${{ steps.check.outcome }}
  plan_output:
    description: 'The stdout from the Tofu plan command'
    value: ${{ steps.plan.outputs.stdout }}
  init_output:
    description: 'The stdout from the Tofu init command'
    value: ${{ steps.init.outputs.stdout }}
  check_output:
    description: 'The stdout from the Tofu validate command'
    value: ${{ steps.check.outputs.stdout }}
runs:
  using: composite
  steps:
    - name: Generate OIDC Token
      # language=bash
      run: |
        set -euo pipefail
        echo "Generating OIDC token for service account impersonation..."
        
        OIDC_TOKEN=$(gcloud auth print-identity-token \
          --impersonate-service-account="${{ inputs.service_account }}" \
          --audiences="//iam.googleapis.com/projects/${{ inputs.workload_identity_pool_project_number }}/locations/global/workloadIdentityPools/${{ inputs.workload_identity_pool_id }}/providers/${{ inputs.workload_identity_provider_id }}")
        
        echo "OIDC_TOKEN=${OIDC_TOKEN}" >> $GITHUB_ENV
        echo "✓ OIDC token generated successfully"
      shell: bash
      id: oidc

    - name: Tofu Init
      # language=bash
      run: |
        set -euo pipefail
        export OIDC_TOKEN="${{ env.OIDC_TOKEN }}"
        export ENVIRONMENT="${{ inputs.environment }}"
        
        echo "Running: OIDC_TOKEN=*** ENVIRONMENT=${ENVIRONMENT} mise init"
        (mise init 2>&1) | tee init.log
        
        echo "stdout<<EOF" >> $GITHUB_OUTPUT
        cat init.log >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      id: init
      shell: bash
      env:
        OIDC_TOKEN: ${{ env.OIDC_TOKEN }}

    - name: Tofu Check
      # language=bash
      run: |
        set -euo pipefail
        export OIDC_TOKEN="${{ env.OIDC_TOKEN }}"
        export ENVIRONMENT="${{ inputs.environment }}"
        
        echo "Running: OIDC_TOKEN=*** ENVIRONMENT=${ENVIRONMENT} mise validate"
        (mise validate 2>&1) | tee check.log
        
        echo "stdout<<EOF" >> $GITHUB_OUTPUT
        cat check.log >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      shell: bash
      id: check
      env:
        OIDC_TOKEN: ${{ env.OIDC_TOKEN }}

    - name: Tofu Plan
      # language=bash
      run: |
        set -euo pipefail
        export OIDC_TOKEN="${{ env.OIDC_TOKEN }}"
        export ENVIRONMENT="${{ inputs.environment }}"
        
        echo "Running: OIDC_TOKEN=*** ENVIRONMENT=${ENVIRONMENT} ${{ inputs.plan_command }}"
        (${{ inputs.plan_command }} 2>&1) | tee plan.log
        
        echo "stdout<<EOF" >> $GITHUB_OUTPUT
        cat plan.log >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      shell: bash
      id: plan
      env:
        OIDC_TOKEN: ${{ env.OIDC_TOKEN }}

    - name: Upload Tofu logs as artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: tofu-logs-${{ inputs.environment }}-${{ github.sha }}
        path: |
          init.log
          check.log
          plan.log
        retention-days: 7

    - name: Post plan to step summary
      uses: actions/github-script@v8
      if: always()
      env:
        PLAN_OUTCOME: ${{ steps.plan.outcome }}
        CHECK_OUTCOME: ${{ steps.check.outcome }}
        INIT_OUTCOME: ${{ steps.init.outcome }}
        PLAN_LOG_PATH: plan.log
        ENVIRONMENT: ${{ inputs.environment }}
        # language=javascript
      with:
        script: |
          const fs = require('fs');
          const planOutcome = process.env.PLAN_OUTCOME;
          const checkOutcome = process.env.CHECK_OUTCOME;
          const initOutcome = process.env.INIT_OUTCOME;
          const planLogPath = process.env.PLAN_LOG_PATH;
          const environment = process.env.ENVIRONMENT;

          // Read plan output from file
          let planOutput = '';
          try {
              planOutput = fs.readFileSync(planLogPath, 'utf8');
              planOutput = planOutput
                  .split('\n')
                  .filter(line => !line.includes('Refreshing state...'))
                  .join('\n');
          } catch (error) {
              planOutput = 'Error reading plan output: ' + error.message;
          }

          const summary = [
              `## Tofu Plan - ${environment}`,
              '',
              '| Step | Status |',
              '| ---- | -------- |',
              `| Tofu Initialization :wrench:️ | \`${initOutcome}\` |`,
              `| Tofu Check :white_check_mark: | \`${checkOutcome}\` |`,
              `| Tofu Plan :pencil: | \`${planOutcome}\` |`,
              '',
              '<details>',
              '',
              '<summary>Show Plan Output</summary>',
              '',
              '```terraform',
              planOutput,
              '```',
              '',
              '</details>',
              '',
              ':package: **Full logs available in workflow artifacts**'
          ].join('\n');

          await core.summary.addRaw(summary).write();
